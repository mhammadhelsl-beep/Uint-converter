<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"><!-- ترميز الاحرف للصفحة بدون هذا الوسم الاحرف العربية ممكن ان تظهر برموز غربية-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"><!--  جعل الموقع متجاوب مع الجوال والتابلت-->
    <title>محول الوحدات - Unit Converter</title>
    <!-- ربط ملف التنسيقات -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- عنوان الصفحة الرئيسي -->
        <h1 class="title">Unit Converter</h1>
        
        <!-- بطاقة المحول -->
        <div class="converter-card">
            <!-- قسم الإدخال -->
            <div class="input-section">
                <label for="inputValue" class="label">القيمة المدخلة:</label>
                <input 
                    type="number" 
                    id="inputValue" 
                    class="input-field" 
                    placeholder="أدخل الرقم هنا"
                    step="any"
                >
            </div>
            <!-- step="any يقبل جميع الارقامالعشري والصحيحة بدونها يقبل فقط ارقام صحيحة"-->
            <!-- قسم اختيار نوع التحويل -->
            <div class="conversion-section">
                <label for="conversionType" class="label">نوع التحويل:</label>
                <select id="conversionType" class="dropdown">
                    <option value="milesToKm">كيلومتر → ميل</option>
                    <option value="kmToMiles">ميل → كيلومتر</option>
                    <option value="fahrenheitToCelsius">مئوية → فهرنهايت</option>
                    <option value="celsiusToFahrenheit">فهرنهايت → مئوية</option>
                </select>
            </div>
            
            <!-- أزرار التحويل والمسح -->
            <div class="button-section">
                <button id="convertBtn" class="btn convert-btn">تحويل</button>
                <button id="clearBtn" class="btn clear-btn">مسح الكل</button>
            </div>
            
            <!-- قسم عرض النتيجة -->
            <div class="result-section">
                <div class="result-label">النتيجة:</div>
                <div id="resultValue" class="result-value">--</div>
            </div>
        </div>
    </div>

    <!-- ربط ملف الجافاسكريبت -->
    <script src="script.js"></script>
</body>
</html>
